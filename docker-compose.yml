services:

  mysql:
    image: mysql:8.4
    container_name: mamsa_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-mamsa}
      MYSQL_USER: ${DB_USERNAME:-mamsa}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mamsa_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-mamsa}", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s

  redis:
    image: redis:7-alpine
    container_name: mamsa_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - mamsa_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mamsa_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mamsa}
      DB_USERNAME: ${DB_USERNAME:-mamsa}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SANCTUM_STATEFUL_DOMAINS: ${FRONTEND_DOMAIN:-localhost}
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - mamsa_net
    # Probe php-fpm's TCP socket so dependents only start once it accepts
    # connections (the entrypoint runs migrations before booting fpm).
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Queue worker — processes SMS/notification/payment jobs off the Redis queue.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mamsa_worker
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mamsa}
      DB_USERNAME: ${DB_USERNAME:-mamsa}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - mamsa_net
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3", "--max-time=3600"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mamsa_frontend
    restart: unless-stopped
    networks:
      - mamsa_net

  nginx:
    image: nginx:alpine
    container_name: mamsa_nginx
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mamsa_net

volumes:
  mysql_data:
  redis_data:
  backend_storage:

networks:
  mamsa_net:
