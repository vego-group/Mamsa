server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Apple Pay web domain verification. Apple fetches this file verbatim; it must
    # be served with NO extension and must NOT fall through to the SPA index.html,
    # otherwise merchant validation fails and the Apple Pay button never renders.
    # Drop the file downloaded from the Moyasar dashboard into
    # frontend/public/.well-known/ so Vite ships it to the build output.
    location = /.well-known/apple-developer-merchantid-domain-association {
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
