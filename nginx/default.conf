server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # API + Sanctum → Laravel php-fpm. All dynamic traffic passes straight to the
    # front controller (a try_files fallback would internal-redirect into the SPA
    # block and break POST bodies).
    location ~ ^/(api|sanctum)/ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        include fastcgi_params;
    }

    # Public storage (uploads + bundled defaults) served straight from disk,
    # from the same volume the backend writes to. Kept ahead of the SPA proxy
    # so image URLs like /storage/defaults/unit-default.avif resolve to files.
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
